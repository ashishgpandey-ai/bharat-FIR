services:
  - type: web
    name: fir-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python firbot_permanent.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_USER_ID
        sync: false
    healthCheckPath: /
    numReplicas: 1